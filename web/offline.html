<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>오프라인 - 홍익인간</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05014A;
      color: #FFFFFF;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    main {
      max-width: 360px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.25;
    }

    p {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>오프라인 상태입니다</h1>
    <p>네트워크 연결을 확인한 뒤 다시 시도해주세요.</p>
  </main>
</body>
</html>
